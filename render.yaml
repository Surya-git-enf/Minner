services:
  - type: web
    name: sniper-god
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: RPC_HTTP
        sync: false
      - key: RPC_WSS
        sync: false
      # Other secrets: add via Render UI (do not commit .env)
